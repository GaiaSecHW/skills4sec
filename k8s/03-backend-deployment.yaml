apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-backend
  namespace: skillhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillhub-backend
  template:
    metadata:
      labels:
        app: skillhub-backend
    spec:
      containers:
      - name: backend
        image: skillhub-backend:latest  # 替换为你的镜像地址
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: secret-key
        - name: DEBUG
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: skillhub-backend
  namespace: skillhub
spec:
  selector:
    app: skillhub-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
