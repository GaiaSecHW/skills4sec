apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-backend
  namespace: skillhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skillhub-backend
  template:
    metadata:
      labels:
        app: skillhub-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/gaiasechw/skillhub-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: secret-key
        - name: DEBUG
          value: "false"
        - name: GITEA_API_URL
          value: "http://skillhub-gitea.skillhub.svc.cluster.local:3000/api/v1"
        - name: GITEA_TOKEN
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: gitea-token
        - name: GITEA_REPO
          value: "admin/skills4sec"
        - name: SUPER_ADMIN_EMPLOYEE_ID
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: super-admin-employee-id
        - name: SUPER_ADMIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: super-admin-api-key
        - name: SUPER_ADMIN_NAME
          value: "系统管理员"
        - name: REPORT_API_BASE_URL
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: report-api-base-url
        - name: REPORT_API_KEY
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: report-api-key
        - name: REPORT_API_MODEL
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: report-api-model
        # ICSL 组织同步配置
        - name: ICSL_GITEA_API_URL
          value: "http://skillhub-gitea.skillhub.svc.cluster.local:3000/api/v1"
        - name: ICSL_GITEA_TOKEN
          valueFrom:
            secretKeyRef:
              name: skillhub-secrets
              key: icsl-gitea-token
        - name: ICSL_ORG_NAME
          value: "icsl"
        - name: ICSL_SYNC_INTERVAL
          value: "300"
        - name: ICSL_SYNC_ON_STARTUP
          value: "true"
        - name: ICSL_DATA_DIR
          value: "/data"
        volumeMounts:
        - name: skill-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: skill-data
        persistentVolumeClaim:
          claimName: skillhub-data
---
apiVersion: v1
kind: Service
metadata:
  name: skillhub-backend
  namespace: skillhub
spec:
  selector:
    app: skillhub-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
