apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillhub-ingress
  namespace: skillhub
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - skillhub.ai.icsl.huawei.com
    - gitea.ai.icsl.huawei.com
    secretName: skillhub-tls
  rules:
  - host: skillhub.ai.icsl.huawei.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: skillhub-backend
            port:
              number: 8000
      - path: /static
        pathType: Prefix
        backend:
          service:
            name: skillhub-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: skillhub-backend
            port:
              number: 8000
  - host: gitea.ai.icsl.huawei.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: skillhub-gitea
            port:
              number: 3000
