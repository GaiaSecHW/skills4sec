# Skill Report Generator 配置文件
# 复制此文件为 config.local.yaml 并修改

# API 配置
api:
  base_url: "${REPORT_API_BASE_URL}"  # 从环境变量读取
  api_key: "${REPORT_API_KEY}"        # 从环境变量读取
  model: "${REPORT_API_MODEL}"        # 从环境变量读取
  timeout: 120                           # 超时秒数

# 生成配置
generation:
  concurrent: 3                          # 并发数
  retry: 2                               # 失败重试次数

# 安全审计规则 - 规则匹配
security_rules:
  scripts:
    extensions: [".sh", ".py", ".js", ".ts", ".mjs", ".ps1", ".bat"]
    patterns: ["#!/bin/", "#!/usr/bin/env"]
  network:
    patterns:
      - "http://"
      - "https://"
      - "fetch("
      - "aiohttp"
      - "requests."
      - "axios"
      - "websocket"
      - "urllib"
      - "httpx"
      - "curl"
  filesystem:
    patterns:
      - "open("
      - ".write("
      - "Path("
      - "os.remove"
      - "os.mkdir"
      - "os.makedirs"
      - "shutil."
      - "os.path"
      - "fs.readFile"
      - "fs.writeFile"
  env_access:
    patterns:
      - "os.environ"
      - "process.env"
      - "dotenv"
      - "load_dotenv"
      - "getenv"
      - "env["
  external_commands:
    patterns:
      - "subprocess"
      - "exec("
      - "eval("
      - "child_process"
      - "os.system"
      - "os.popen"
      - "commands."

# 危险模式（高风险）
dangerous_patterns:
  - pattern: "eval\\s*\\("
    description: "Dynamic code execution"
  - pattern: "exec\\s*\\("
    description: "Dynamic code execution"
  - pattern: "subprocess.*shell=True"
    description: "Shell injection risk"
  - pattern: "os.system\\s*\\("
    description: "System command execution"
  - pattern: "__import__\\s*\\("
    description: "Dynamic import"
