version: '3.8'

services:
  backend:
    build: ./backend
    container_name: skillhub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"  # 可选：直接访问后端
    networks:
      - skillhub-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: skillhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - skillhub-network

networks:
  skillhub-network:
    driver: bridge
